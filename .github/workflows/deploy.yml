name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build container
        run: docker build -t it-staffing-operating-system:latest .
      - name: Validate Terraform files
        run: test -f infrastructure/terraform/main.tf && test -f infrastructure/terraform/variables.tf
      - name: Validate Airflow assets
        run: test -f src/orchestration/dags/airflow_platform_dag.py && test -f src/orchestration/schedules/platform_schedules.yaml
      - name: Deployment note
        run: echo "Container publish, Snowflake release, and Terraform apply are executed per environment from protected release workflows."
