version: "3.9"

services:
  api:
    build: ../..
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.example

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: staffing_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
